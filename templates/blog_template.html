<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        <style>
:root{
  --text:#1f2937;
  --muted:#6b7280;
  --border:#e5e7eb;
  --soft:#f9fafb;
  --accent:#2563eb;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.7;
  background:#fff;
  color:var(--text);
  padding:24px 16px;
}

article{
  max-width:720px;
  margin:0 auto;
}

h1{
  font-size:clamp(26px,5vw,36px);
  line-height:1.25;
  margin-bottom:20px;
}

h2{
  font-size:clamp(20px,4vw,24px);
  margin:40px 0 14px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}

h3{
  font-size:18px;
  margin:28px 0 10px;
}

p{margin-bottom:16px}

.meta,small{
  font-size:14px;
  color:var(--muted);
}

ul,ol{
  margin:16px 0 20px 20px;
}

li{margin-bottom:8px}

a{
  color:var(--accent);
  text-decoration:none;
}

a:hover{text-decoration:underline}

blockquote{
  border-left:4px solid var(--border);
  padding:12px 16px;
  margin:24px 0;
  background:var(--soft);
  color:var(--muted);
}

pre{
  background:var(--soft);
  padding:16px;
  border-radius:6px;
  overflow-x:auto;
  margin:20px 0;
  font-size:14px;
}

code{
  background:var(--soft);
  padding:2px 6px;
  border-radius:4px;
  font-size:13px;
}

pre code{
  background:transparent;
  padding:0;
}

table{
  width:100%;
  border-collapse:collapse;
  margin:20px 0;
  font-size:14px;
}

th,td{
  border:1px solid var(--border);
  padding:10px;
  text-align:left;
}

th{
  background:var(--soft);
  font-weight:600;
}

img{
  max-width:100%;
  height:auto;
  border-radius:6px;
  margin:20px 0;
}

hr{
  border:none;
  border-top:1px solid var(--border);
  margin:40px 0;
}
</style>

<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$']],
    displayMath: [['$$', '$$']]
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<article>
    {{content}}
</article>

</body>
</html>
